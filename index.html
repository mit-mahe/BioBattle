<style>

  :root{
    --bg:#080b10;
    --panel:#111722;
    --panel-2:#161d2b;
    --line:#232b3a;
    --cream:#eee6d3;
    --card-cream:#f9f9e1;
    --muted:#8a93a6;
    --terra:#1a4c27;
    --aqua:#22467a;
    --flare:#7b0c12;
    --aero:#638ac3;
    --spark:#a3651a;
    --signal:#D0F4EA;
    --signal-dim:#1c3833;
    --boss-bg:#335c58;
    --boss-accent:#a8d9d3;
    --aether-bg:#611748;
    --aether-accent:#e792cd;
    --tartara-bg:#211641;
    --tartara-accent:#b6a4e8;
    --chimera-bg:#a3401d;
    --chimera-accent:#ffd9b0;
    --danger:#e05a5a;
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; }

body{
    margin:0;
    background:
      linear-gradient(rgba(8,11,16,0.35), rgba(8,11,16,0.45)) center center / cover no-repeat fixed,
      url("images/bg_1.jpg") center center / cover no-repeat fixed,
      var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100%;
  }

  .wrap{ max-width:920px; margin:0 auto; padding:28px 18px 60px; }


  /* ---------- header ---------- */
  .brand{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }

  .brand h1{
    font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:0.06em;
    font-size:1.5rem; margin:0; color:var(--cream);
  }

  .brand h1 span{ color:var(--signal); }

  .brand small{ color:#000; font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.08em; }


  .progress{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px; }

  .progress .step{
    font-family:'IBM Plex Mono',monospace; font-size:.68rem; letter-spacing:.06em;
    color:var(--muted); border:1px solid var(--line); border-radius:20px; padding:5px 12px;
    background:var(--panel);
  }

  .progress .step.active{ color:#05140f; background:var(--signal); border-color:var(--signal); font-weight:600; }

  .progress .step.done{ color:var(--signal); border-color:var(--signal-dim); }


  /* ---------- roster bar ---------- */
  .roster-bar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }

  .chip{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 12px; min-width:150px; position:relative; overflow:hidden;
  }

  .chip::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--chip-color,var(--signal)); }

  .chip.dead{ opacity:.35; filter:grayscale(1); }

  .chip .cname{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:.85rem; }

  .chip .cmeta{ font-family:'IBM Plex Mono',monospace; font-size:.66rem; color:var(--muted); margin-top:2px; }

  .chip .cstats{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; margin-top:4px; display:flex; gap:10px; }

  .chip .cstats b{ color:var(--signal); }


  /* ---------- panel / card ---------- */
  .panel{
    background:rgba(17,23,34,0.82); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--line); border-radius:16px;
    padding:26px; margin-bottom:20px;
  }
</style>
<style>

  .panel h2{
    font-family:'Space Grotesk',sans-serif; margin:0 0 12px; font-size:1.15rem; letter-spacing:.02em;
  }

  .panel p{ color:#c9c2ae; line-height:1.6; font-size:.94rem; }

  .muted{ color:var(--muted); }


  .rule-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }

  @media (max-width:640px){ .rule-grid{ grid-template-columns:1fr; } }

  .rule-grid div{
    background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    font-size:.82rem; color:#c9c2ae;
  }

  .rule-grid b{ color:var(--cream); font-family:'Space Grotesk',sans-serif; }

  /* ---------- instructions rulebook list ---------- */
  .instr-ol{ margin:16px 0 0; padding-left:22px; color:#c9c2ae; font-size:.9rem; line-height:1.7; }

  .instr-ol > li{ margin-bottom:12px; }

  .instr-ol > li > b{ color:var(--cream); font-family:'Space Grotesk',sans-serif; font-weight:700; }

  .instr-sub{ margin:6px 0 0; padding-left:22px; font-size:.84rem; color:#a8a190; }

  .instr-sub li{ margin-bottom:4px; }

  .instr-sub b{ color:var(--cream); }

  .instr-divider{
    display:flex; align-items:center; justify-content:center; gap:12px;
    margin:26px 0 18px; color:var(--muted); font-size:.9rem; letter-spacing:.1em;
  }

  .instr-divider span{ flex:1; max-width:160px; height:1px; background:var(--line); }

  .instr-divider i{ font-style:normal; opacity:.8; }

  .type-row{ display:flex; justify-content:space-between; gap:10px; margin-top:16px; }

  .type-item{ display:flex; flex-direction:column; align-items:center; gap:9px; flex:1; min-width:0; }

  .type-item .tswatch{ width:44px; height:44px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 1px var(--line); }

  .type-item .tswatch-icon{
    width:44px; height:44px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 1px var(--line);
    background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; overflow:hidden;
  }

  .type-item .tswatch-icon img{ width:100%; height:100%; object-fit:contain; display:block; }

  .type-item-label{
    font-family:'IBM Plex Mono',monospace; font-size:.62rem; letter-spacing:.04em;
    color:var(--muted); text-align:center; text-transform:uppercase; line-height:1.3;
  }

  @media (max-width:640px){
    .type-row{ flex-wrap:wrap; justify-content:center; row-gap:18px; }
    .type-item{ flex:0 0 30%; }
  }


  /* ---------- buttons ---------- */
  .btn{
    font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:.02em;
    background:var(--signal); color:#05140f; border:none; border-radius:10px;
    padding:12px 22px; font-size:.92rem; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 0 0 rgba(60,232,176,0);
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn-chip{
    font-family:'IBM Plex Mono',monospace; font-size:.78rem; background:var(--panel-2);
    color:var(--cream); border:1px solid var(--danger); border-radius:20px; padding:8px 14px;
    cursor:pointer; transition:background .15s ease;
  }
  .btn-chip:hover{ background:var(--danger); color:#fff; }

  .page-hint{
    background:rgba(208,244,234,0.08); border:1px solid var(--signal-dim); border-radius:8px;
    padding:10px 14px; font-size:.82rem; color:var(--cream); margin:0 0 14px; line-height:1.5;
  }
  .page-hint.hidden{ display:none; }

  .panel-header-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-wrap:wrap; margin-bottom:12px;
  }
  .panel-header-row h2{ margin:0; }
  .panel-back-btn{
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:.82rem; background:var(--cream);
    color:#11141c; border:none; border-radius:20px; padding:10px 18px;
    cursor:pointer; transition:background .15s ease, transform .12s ease; flex-shrink:0;
  }
  .panel-back-btn:hover{ background:var(--signal); transform:translateY(-1px); }

  .btn:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(208,244,234,0.35); }

  .btn:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn.ghost{
    background:transparent; color:var(--cream); border:1px solid var(--line);
  }
  .cover-btn.ghost{
    background:rgba(8,11,16,.6); color:var(--signal); border:1.5px solid var(--signal); font-weight:600;
  }
  .cover-btn.ghost:hover{ background:rgba(8,11,16,.8); }

  .btn.ghost:hover{ box-shadow:none; border-color:var(--signal); }

  .btn-row{ display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; }


  /* ---------- element card: real scanned card art (as an <img>) with editable stat overlay ---------- */
  @keyframes cardFlipIn{
    0%{ transform:perspective(800px) rotateY(78deg) scale(.94); opacity:0; }
    55%{ transform:perspective(800px) rotateY(-8deg) scale(1.01); opacity:1; }
    100%{ transform:perspective(800px) rotateY(0deg) scale(1); opacity:1; }
  }

  .card{
    position:relative; border-radius:8px; padding:0; border:none;
    background-color: var(--card-color,#274);
    overflow:hidden; width:100%; max-width:190px; margin:0 auto; line-height:0;
    box-shadow:0 8px 18px rgba(0,0,0,.45);
    color:var(--card-cream);
    }

  .card-img{ display:block; width:100%; height:auto; pointer-events:none; -webkit-user-drag:none; }

  .card-img-fallback{
    display:flex; align-items:center; justify-content:center; text-align:center; aspect-ratio:504/731;
    font-family:'Playfair Display',serif; font-weight:700; font-size:1.05rem; padding:10%; color:var(--card-cream);
  }


  .stat-mask{ position:absolute; top:84.5%; height:6%; width:25%; background:var(--card-color); }

  .stat-mask.atk{ left:8%; }

  .stat-mask.def{ left:67%; }

  .stat-overlay{
    position:absolute; top:84.5%; height:6%; width:25%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-weight:700; font-size:16px; line-height:1;
    white-space:nowrap; color:var(--card-cream);
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  .stat-overlay.atk{ left:8%; }

  .stat-overlay.def{ left:67%; }
</style>
<style>


  .card-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:14px; }

  .card-grid.grid-2{ grid-template-columns:1fr 1fr; }

  @media (max-width:480px){ .card-grid{ grid-template-columns:1fr 1fr; } }


  .genmod-card{ cursor:pointer; transition:box-shadow .15s ease, transform .15s ease; }

  .genmod-card:hover{ transform:translateY(-2px); }

  .genmod-card.selected{ box-shadow:0 0 0 3px var(--signal); }

  .genmod-card.used{ opacity:.35; cursor:default; pointer-events:none; }


  .assign-target{ cursor:pointer; }

  .assign-target.pickable{ box-shadow:0 0 0 4px #FFD23F; animation:pulse 1.4s infinite; }

  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 4px #FFD23F;} 50%{ box-shadow:0 0 0 4px transparent; } }

  .bonus-genmod-section{ border-radius:12px; transition:box-shadow .2s ease; }
  .bonus-genmod-section.flash-attention{ animation:flashAttention 1.2s ease; }
  @keyframes flashAttention{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,210,63,0); }
    20%,60%{ box-shadow:0 0 0 6px rgba(255,210,63,0.55); }
    40%,80%{ box-shadow:0 0 0 0 rgba(255,210,63,0); }
  }


  .genmod-list{ margin-top:8px; font-family:'IBM Plex Mono',monospace; font-size:.68rem; color:rgba(255,255,255,.85); }


  /* ---------- card hover tooltip (field-fact reveal after 2s hover) ---------- */
  .card-frame{ position:relative; max-width:190px; margin:0 auto; }

  .card-frame .card{ max-width:100%; }

  .fact-tip{
    position:absolute; left:50%; bottom:calc(100% + 10px); transform:translateX(-50%) translateY(6px);
    width:280px; background:var(--panel-2); border:1px solid var(--signal-dim); border-radius:10px;

function biohazardIconSvg(){
  const blade = `<g>
    <circle cx="0" cy="-16" r="7" fill="none" stroke="currentColor" stroke-width="3"/>
    <path d="M0,-9 L0,-2 M-6,-5 L-2,-1 M6,-5 L2,-1" stroke="currentColor" stroke-width="3" fill="none"/>

    <g transform="translate(50,52)">
      <circle r="6" fill="currentColor" stroke="none"/>
      <g transform="rotate(0)">${blade}</g>
      <g transform="rotate(120)">${blade}</g>
      <g transform="rotate(240)">${blade}</g>
    </g>
  `, "0 0 100 100");
}

function pathogenIconSvg(){
  const spikes = [];
  for(let i=0;i<10;i++){
    const a = (i/10)*2*Math.PI;
    const x1=50+34*Math.cos(a), y1=50+34*Math.sin(a);
    const x2=50+46*Math.cos(a), y2=50+46*Math.sin(a);
    spikes.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke-width="3"/>`);
    spikes.push(`<circle cx="${x2.toFixed(1)}" cy="${y2.toFixed(1)}" r="3.4" fill="currentColor" stroke="none"/>`);
  }
  return svgWrap(`
    <circle cx="50" cy="50" r="34" stroke-width="2.5"/>
    <circle cx="40" cy="42" r="4" stroke-width="1.6"/>
    <circle cx="58" cy="38" r="3" stroke-width="1.6"/>
    <circle cx="46" cy="58" r="3.6" stroke-width="1.6"/>
    <circle cx="60" cy="58" r="2.6" stroke-width="1.6"/>
    ${spikes.join("")}
  `, "0 0 100 100");
}

const state = {
  screen:"title", roster:[], starterGenmods:[], wbQueue:[], bossDefeats:0, currentBoss:null,
  round:0, bossRound:0, phase:"setup", chaosDrawn:[], lastFight:null, gameOverText:null,
  selectedGenmod:null, previousScreen:"title",
};

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function draw(arr,n){ return shuffle(arr).slice(0,n).map(o=>({...o})); }
/* ---------- save / restore across reloads ---------- */
const SAVE_KEY = "biobattle_save_v1";

function persistState(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}

function rehydrateFx(list, master){
  return (list||[]).map(item=>{
    const found = master.find(m=>m.name===item.name);
    return found ? {...item, fx: found.fx} : item;
  });
}

function loadPersistedState(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const saved = JSON.parse(raw);
    Object.assign(state, saved);
    state.wbQueue = rehydrateFx(state.wbQueue, WILDBYTES);
    state.chaosDrawn = rehydrateFx(state.chaosDrawn, CHAOS);
    if(state.currentBoss){
      const foundBoss = BOSSES.find(b=>b.name===state.currentBoss.name);
      if(foundBoss) state.currentBoss = {...state.currentBoss, fx: foundBoss.fx};
    }
    return true;
  }catch(e){ return false; }
}

function newRun(){
  const cores = draw(BIOCORES,2).map(c=>({
    name:c.name, sci:c.sci, el:c.el, mech:c.mech,
    baseAtk:c.atk, baseDef:c.def, maxDef:c.def, genmods:[], roundExclusions:[],
    nextRoundQueue:{disableAllGenmods:false, disableGenmodEl:null}, lostLastBossRound:false, alive:true
  }));
  state.roster = cores;
  state.starterGenmods = draw(GENMODS,2);
  state.givenGenmodNames = state.starterGenmods.map(g=>g.name);
  state.pendingBonusGenmod = null;
  state.wbQueue = draw(WILDBYTES,3);
  state.round = 0; state.bossRound = 0; state.phase = "setup";
  state.selectedGenmod = null; state.gameOverText = null;
  state._achievementsEvaluated = false; state.newlyUnlocked = [];
  state.wbWins = 0;
  state.bossDefeats = 0;
  state.currentBoss = null;
  state.screen = "setup";
}

function assignGenmodTo(gIdx,bIdx){
  const g = state.starterGenmods[gIdx];
  if(!g || g.used) return;
  const core = state.roster[bIdx];
  core.genmods.push({name:g.name, el:g.el, mech:g.mech, atk:g.atk, def:g.def, disabled:false});
  g.used = true; state.selectedGenmod = null;
  render();
}

function assignBonusGenmod(bIdx){
  const g = state.pendingBonusGenmod;
  if(!g) return;
  const core = state.roster[bIdx];
  if(!core || !core.alive) return;
  core.genmods.push({name:g.name, el:g.el, mech:g.mech, atk:g.atk, def:g.def, disabled:false});
  state.pendingBonusGenmod = null;
  render();
}

// A GenMod contributes only while it is neither permanently disabled nor
// temporarily locked for the current round (see beginBossRoundExclusions()).
function activeGenmods(core){
  const excl = core.roundExclusions || [];
  return core.genmods.filter(g=>!g.disabled && !excl.includes(g.name));
}
function genmodBonus(core){
  const mods = activeGenmods(core);
  return { atk: mods.reduce((s,g)=>s+g.atk,0), def: mods.reduce((s,g)=>s+g.def,0) };
}
function currentStats(core){
  const gb = genmodBonus(core);
  return { atk: Math.max(0,core.baseAtk+gb.atk), def: Math.max(0,core.baseDef+gb.def) };
}
function aliveRoster(){ return state.roster.filter(b=>b.alive); }
function currentEnemy(){ return state.phase==="boss" ? state.currentBoss : state.wbQueue[state.round]; }

function buildOpp(core, useRound){
  const base = (useRound && core._round && !core._round.disabled) ? core._round : currentStats(core);
  const active = activeGenmods(core);
  return {
    atk: base.atk, def: base.def, baseAtk: core.baseAtk, baseDef: core.baseDef,
    el: core.el, mech: core.mech,
    genmods: active, genmodCount: active.length,
    hasGenmodEl: (el)=> active.some(g=>g.el===el),
    hasGenmodMech: (m)=> active.some(g=>g.mech===m),
  };
}

function doFight(coreIdx){
  const core = state.roster[coreIdx];
  const isBoss = state.phase==="boss";
  const enemy = currentEnemy();
  const opp = buildOpp(core, isBoss);

  const self = { atk: enemy.atk, def: enemy.def };
  const log = [];
  enemy.fx(self,opp,log,core);
  self.atk=Math.max(0,self.atk); self.def=Math.max(0,self.def);
  opp.atk=Math.max(0,opp.atk); opp.def=Math.max(0,opp.def);

  const win = (opp.atk>self.def) && (self.atk<opp.def);
  let dmg=0;
  if(!win){
    dmg = Math.max(0, self.atk-opp.def) || 1;
    core.baseDef -= dmg;
    if(currentStats(core).def<=0) core.alive=false;
    if(isBoss && core.alive) core.lostLastBossRound = true;
  }
  state.lastFight = { enemyName:enemy.name, isBoss, win, coreName:core.name,
    coreAtk:opp.atk, coreDef:opp.def, enemyAtk:self.atk, enemyDef:self.def, dmg, coreIdx,
    destroyed: !core.alive, log };

  if(win && !isBoss){
    state.wbWins = (state.wbWins||0) + 1;
    state.roster.push({ name:enemy.name, sci:"Assimilated WildByte", el:"Spark", mech:"Mammal",
      baseAtk:enemy.atk, baseDef:enemy.def, maxDef:enemy.def, genmods:[], roundExclusions:[],
      nextRoundQueue:{disableAllGenmods:false, disableGenmodEl:null}, lostLastBossRound:false, alive:true, imgType:"wildbyte" });
    const givenNames = state.givenGenmodNames || [];
    const pool = GENMODS.filter(g=>!givenNames.includes(g.name));
    if(pool.length){
      const awarded = draw(pool,1)[0];
      state.pendingBonusGenmod = {name:awarded.name, el:awarded.el, mech:awarded.mech, atk:awarded.atk, def:awarded.def, base:awarded.base};
      state.givenGenmodNames = givenNames.concat([awarded.name]);
    }
  }
  if(win && isBoss){
    state.bossDefeats = (state.bossDefeats||0) + 1;
  }
  state.screen = "fight-result";
  render();
}

function proceedAfterFight(){
  try{
    if(state.lastFight.isBoss){
      if(aliveRoster().length===0){ state.gameOverText="lose"; state.screen="end"; render(); return; }
      if((state.bossDefeats||0)>=2){ state.gameOverText="win"; state.screen="end"; render(); return; }
      enterBossRound();
    } else {
      state.round++;
      if(aliveRoster().length===0){ state.gameOverText="lose"; state.screen="end"; render(); return; }
      if(state.round>=state.wbQueue.length){ state.screen = "phase-transition"; }
      else { state.screen = "pick"; }
    }
    render();
  }catch(err){
    console.error("proceedAfterFight failed:", err);
    if(aliveRoster().length===0){
      state.gameOverText = state.gameOverText || "lose";
      state.screen = "end";
    }
    render();
  }
}

function beginBossPhase(){
  state.phase="boss"; state.bossRound=0; state.bossDefeats=0;
  enterBossRound();
  render();
}

// Applies any "next round" GenMod locks queued by the previous boss fight,
// then draws a fresh pair of Chaos Factor cards for the round about to start
// — per the rulebook, Chaos Factor cards are drawn before EACH Hollowcross
// bioweapon individually, not once for the whole boss phase.
function enterBossRound(){
  state.roster.forEach(core=>{
    core.roundExclusions = [];
    if(core.nextRoundQueue.disableAllGenmods){
      core.genmods.forEach(g=>{ if(!g.disabled) core.roundExclusions.push(g.name); });
    }
    if(core.nextRoundQueue.disableGenmodEl){
      core.genmods.forEach(g=>{ if(g.el===core.nextRoundQueue.disableGenmodEl && !g.disabled) core.roundExclusions.push(g.name); });
    }
    core.nextRoundQueue = { disableAllGenmods:false, disableGenmodEl:null };
  });
  state.currentBoss = draw(BOSSES,1)[0];
  state.bossRound++;
  startChaosDraw();
}

function startChaosDraw(){
  state.phase = "chaos";
  state.chaosDrawn = draw(CHAOS,1);
  state.chaosCtx = {};
  state.roster.forEach(b=>{
    const cs=currentStats(b);
    const disabledFromLoss = !!b.lostLastBossRound;
    b._round={atk:cs.atk,def:cs.def,beforeAtk:cs.atk,beforeDef:cs.def,disabled:disabledFromLoss, disabledReason: disabledFromLoss ? "lost its last Hollowcross clash" : null};
    b.lostLastBossRound = false;
  });
  state.pendingHijack = state.chaosDrawn.some(c=>c.name==="Hijack");
  state.pendingSecondWind = null;
  state.chaosDrawn.forEach(c=>{
    if(c.name==="Hijack") return;
    if(c.name==="Second Wind"){
      const options = draw(GENMODS,2);
      state.pendingSecondWind = { options, selectedIdx:null };
      return;
    }
    const ctx = {};
    c.fx(state.roster, ctx);
    state.chaosCtx[c.name] = ctx;
  });
  checkGauntletDeadlock();
}

function checkGauntletDeadlock(){
  const hasPlayableCore = state.roster.some(b=>b.alive && !(b._round && b._round.disabled));
  if(!hasPlayableCore){
    state.gameOverText = "lose-deadlock";
    state.screen = "end";
  } else {
    state.screen = "chaos-reveal";
  }
}

function resolveHijack(coreIdx, genmodIdx){
  const core = state.roster[coreIdx];
  const g = core.genmods[genmodIdx];
  if(!core || !g || g.disabled) return;
  g.disabled = true;
  const cs = currentStats(core);
  core._round.atk = cs.atk;
  core._round.def = cs.def;
  state.pendingHijack = false;
  render();
}

function selectSecondWindOption(idx){
  if(!state.pendingSecondWind) return;
  state.pendingSecondWind.selectedIdx = idx;
  render();
}

function resolveSecondWind(coreIdx){
  const sw = state.pendingSecondWind;
  if(!sw || sw.selectedIdx===null) return;
  const core = state.roster[coreIdx];
  if(!core || !core.alive) return;
  const g = sw.options[sw.selectedIdx];
  core._round.atk += g.atk;
  core._round.def += g.def;
  core._round.secondWindGenmod = g.name;
  state.pendingSecondWind = null;
  render();
}

function proceedToBoss(){ state.phase = "boss"; state.screen = "pick"; render(); }

/* ============================ RENDER ============================ */

const app = document.getElementById("app");
function render(){
  try{
    app.innerHTML = renderScreen();
    attachHandlers();
    updateTopRightCredit();
    waitForAppImages();
    persistState();
    try{
      if(location.hash.slice(1) !== state.screen){
        history.replaceState(null, "", "#"+state.screen);
      }
    }catch(e){}
  }catch(err){
    console.error("render() failed:", err);
    hideLoader();
  }
}

function waitForAppImages(){
  const imgs = Array.from(app.querySelectorAll("img"));
  const pending = imgs.filter(img => !img.complete);
  if(pending.length === 0){ hideLoader(); return; }
  showLoader();
  let remaining = pending.length;
  const done = ()=>{ remaining--; if(remaining<=0) hideLoader(); };
  pending.forEach(img=>{
    img.addEventListener("load", done, {once:true});
    img.addEventListener("error", done, {once:true});
  });
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function genmodLabel(core,g){
  if(g.disabled) return `${g.name} (permanently disabled)`;
  if((core.roundExclusions||[]).includes(g.name)) return `${g.name} (locked this round)`;
  return g.name;
}

function progressBar(){
  const steps = [
    {label:"Setup", key:"setup"},
    {label:"WildByte I", key:"wb0"},
    {label:"WildByte II", key:"wb1"},
    {label:"WildByte III", key:"wb2"},
    {label:"Hollowcross Gauntlet", key:"gauntlet"},
  ];
  let currentKey = "setup";
  if(state.phase==="wildbyte") currentKey = "wb"+state.round;
  if(state.phase==="chaos" || state.phase==="boss") currentKey = "gauntlet";
  const order = steps.map(s=>s.key);
  const curIdx = order.indexOf(currentKey);
  const gauntletDone = state.gameOverText==="win";
  return `<div class="progress">${steps.map((s,i)=>{
    let cls = "step";
    if(s.key==="gauntlet" && gauntletDone) cls += " done";
    else if(i<curIdx) cls += " done"; else if(i===curIdx) cls += " active";
    return `<div class="${cls}">${esc(s.label)}</div>`;
  }).join("")}</div>`;
}

function rosterBar(){
  if(!state.roster.length) return "";
  return `<div class="roster-bar">${state.roster.map(b=>{
    const cs = currentStats(b);
    const color = EL_COLOR[b.el] || "var(--signal)";
    return `<div class="chip ${b.alive?"":"dead"}" style="--chip-color:${color}">
      <div class="cname">${esc(b.name)}${b.alive?"":" ✕"}</div>
      <div class="cmeta">${esc(b.el)} · ${esc(b.mech)}</div>
      <div class="cstats"><span>ATK <b>${cs.atk}</b></span><span>DEF <b>${cs.def}</b></span></div>
    </div>`;
  }).join("")}</div>`;
}

function cardImgSrc(type, name){ return (CARD_IMAGES[type+":"+name] || {}).src || ""; }
function cardColor(type, name){ return (CARD_IMAGES[type+":"+name] || {}).color || "#1c2433"; }

function getFact(type, name, base){
  let f = ORGANISM_FACTS[type+":"+name];
  if(!f && base){

function wrapWithFactTip(cardHtml, type, name, base){

/* ---------- persistence helpers ---------- */
function loadJSON(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
}

/* ---------- fun fact codex ---------- */
const CODEX_KEY = "biobattle_codex_v1";
let codexSeen = new Set(loadJSON(CODEX_KEY, []));
function factKeyFor(type, name, base){
  if(ORGANISM_FACTS[type+":"+name]) return type+":"+name;
  if(base){
    if(ORGANISM_FACTS["biocore:"+base]) return "biocore:"+base;
    if(ORGANISM_FACTS["genmod:"+base]) return "genmod:"+base;
  }
  return null;
}
function markFactSeen(type, name, base){
  const key = factKeyFor(type, name, base);
  if(key && !codexSeen.has(key)){
    codexSeen.add(key);
    saveJSON(CODEX_KEY, [...codexSeen]);
  }
}

  {id:"victory", name:"Bioweapon Slayer", desc:"Win a run by neutralizing both Project Hollowcross bioweapons.",
    check: s => s.gameOverText==="win"},
  {id:"perfect", name:"Perfect Run", desc:"Win a run without losing a single starting BioCore.",
    check: s => s.gameOverText==="win" && s.roster.slice(0,2).every(b=>b.alive)},
  {id:"stacked", name:"Stacked Up", desc:"Win a run after assigning both starting GenMods to the same BioCore.",
    check: s => s.gameOverText==="win" && s.roster.slice(0,2).some(b=>(b.genmods||[]).length>=2)},
  {id:"split", name:"Even Split", desc:"Win a run after giving each starting BioCore exactly one GenMod.",
    check: s => s.gameOverText==="win" && s.roster.slice(0,2).every(b=>(b.genmods||[]).length===1)},
  {id:"researcher", name:"Field Researcher", desc:"Discover 10 or more Field Notes in the Explorer's Log.",
    check: () => codexSeen.size>=10},
  {id:"naturalist", name:"Master Naturalist", desc:"Discover every Field Note in the Explorer's Log.",
    check: () => codexSeen.size>=Object.keys(ORGANISM_FACTS).length}
];
const ACH_KEY = "biobattle_achievements_v1";
let unlockedAchievements = new Set(loadJSON(ACH_KEY, []));
function evaluateAchievements(){
  const freshlyUnlocked = [];
  ACHIEVEMENTS.forEach(a=>{
    if(!unlockedAchievements.has(a.id) && a.check(state)){
      unlockedAchievements.add(a.id);
      freshlyUnlocked.push(a);
    }
  });
  if(freshlyUnlocked.length) saveJSON(ACH_KEY, [...unlockedAchievements]);
  return freshlyUnlocked;
}

function drawResultCardCanvas(){
  const canvas = document.createElement("canvas");
  canvas.width = 800; canvas.height = 450;

  const grad = ctx.createLinearGradient(0, 0, 800, 450);
  grad.addColorStop(0, "#4b3a80");
  grad.addColorStop(1, "#a3401d");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 450);
  ctx.fillStyle = "rgba(8,11,16,0.55)";
  ctx.fillRect(0, 0, 800, 450);

  const win = state.gameOverText === "win";

  ctx.fillStyle = "#eee6d3";
  ctx.font = "bold 40px 'Space Grotesk', sans-serif";
  ctx.fillText("BIOBATTLE", 40, 66);

  ctx.font = "13px 'IBM Plex Mono', monospace";
  ctx.fillStyle = "#c9c2ae";
  ctx.fillText("SYNTHETIC BIOLOGY // SOLO PROTOCOL", 40, 88);

  ctx.textAlign = "right";
  ctx.font = "12px 'IBM Plex Mono', monospace";
  ctx.fillStyle = "#c9c2ae";
  ctx.fillText("Adapted from BioBattle - Manipal BioMachines", 760, 34);
  ctx.textAlign = "left";

  ctx.font = "bold 28px 'Space Grotesk', sans-serif";
  ctx.fillStyle = win ? "#D0F4EA" : "#e05a5a";
  ctx.fillText(win ? "VICTORY" : "DEFEAT", 40, 140);

  ctx.font = "16px 'IBM Plex Mono', monospace";
  ctx.fillStyle = "#eee6d3";
  const starterNames = state.roster.slice(0,2).map(b=>b.name).join(" & ") || "—";
  const survivors = aliveRoster().map(b=>b.name).join(", ") || "None";
  const lines = [
    `Squad: ${starterNames}`,
    `Bosses Neutralized: ${state.bossDefeats||0} / 2`,
    `Surviving BioCores: ${survivors}`,
    `Field Notes Discovered: ${codexSeen.size} / ${Object.keys(ORGANISM_FACTS).length}`,
    `Achievements Unlocked: ${unlockedAchievements.size} / ${ACHIEVEMENTS.length}`
  ];
  lines.forEach((line, i)=> ctx.fillText(line, 40, 185 + i*28));

  if(state.newlyUnlocked && state.newlyUnlocked.length){
    let y = 185 + lines.length*28 + 26;
    ctx.font = "bold 15px 'IBM Plex Mono', monospace";
    ctx.fillStyle = "#e0a94f";
    ctx.fillText("New this run:", 40, y);
    ctx.font = "14px 'IBM Plex Mono', monospace";
    ctx.fillStyle = "#eee6d3";
    state.newlyUnlocked.forEach((a, i)=> ctx.fillText(`• ${a.name}`, 60, y + 22 + i*20));
  }

  ctx.font = "12px 'IBM Plex Mono', monospace";
  ctx.fillStyle = "#8a93a6";
  ctx.fillText("Game Design and Development by Shivam Mohite", 40, 420);
  ctx.fillText("Creative Design by Aditi Rishiraj, Neethu Mariam, V. Sai Pallavi", 40, 436);

  return canvas;
}

function downloadResultCard(){
  showLoader();
  setTimeout(()=>{

// Builds a strategic reference report by scanning every WildByte/Boss card's
// own Overdrive text for element and mechanic keywords, weighting each hit by
// its actual ATK/DEF magnitude (not just a raw count), and separately tracking
// which GenMod Elements get punished simply for being equipped. It never names
// specific cards or effects — only the aggregate pattern — so players can plan
// GenMod assignment and BioCore picks without knowing exactly what's coming.
const ELEMENT_NAMES = ["Terra","Aqua","Flare","Aero","Spark"];
const MECHANIC_NAMES = ["Mammal","Plant","Fish","Avian","Amphibian","Reptile"];

const TIER_TIPS = {
  low:  { label:"Low Risk",      tone:"low", tip:"Rarely singled out by the deck — a comparatively safe type to field." },
  mid:  { label:"Moderate Risk", tone:"mid", tip:"Contested by a handful of threats — keep a DEF buffer or a backup GenMod ready." },
  high: { label:"High Risk",     tone:"high", tip:"Heavily targeted across the deck — pair with strong GenMods or hold it in reserve for later rounds." },
};
const GENMOD_TIER_TIPS = {
  low:  { label:"Safe to Equip",   tone:"low", tip:"Little to no downside from equipping this GenMod Element." },
  mid:  { label:"Situational",     tone:"mid", tip:"A few threats specifically punish carrying this GenMod Element — fine in moderation." },
  high: { label:"Risky to Stack",  tone:"high", tip:"Multiple threats directly counter BioCores carrying this GenMod Element — avoid stacking two of these on one BioCore." },
};

function tierFor(list){
  // list: [{key, total}], returns {key: tierInfo}
  const sorted = list.slice().sort((a,b)=>a.total-b.total);
  const n = sorted.length;
  const out = {};
  sorted.forEach((item,idx)=>{
    const pct = n>1 ? idx/(n-1) : 0;
    const tone = pct<=0.34 ? "low" : (pct<=0.67 ? "mid" : "high");
    out[item.key] = tone;
  });
  return out;
}

function buildFieldIndex(){
  const allCards = [...WILDBYTES, ...BOSSES];
  const elAgg = {}; ELEMENT_NAMES.forEach(e=>elAgg[e]={count:0,total:0});
  const mechAgg = {}; MECHANIC_NAMES.forEach(m=>mechAgg[m]={count:0,total:0});
  const genmodAgg = {}; ELEMENT_NAMES.forEach(e=>genmodAgg[e]={count:0});

  const numRe = /([+-]\d+)\s*(ATK|DEF)/i;
  const genmodMentionRe = /[A-Za-z]+-type GenMod(s)?/gi;

  function scanText(text){
    if(!text) return;
    const genmodMatches = text.match(genmodMentionRe) || [];
    genmodMatches.forEach(m=>{
      ELEMENT_NAMES.forEach(e=>{ if(new RegExp("^"+e+"-type","i").test(m)) genmodAgg[e].count++; });
    });
    const cleaned = text.replace(genmodMentionRe, "");
    const numMatch = cleaned.match(numRe);
    const mag = numMatch ? Math.abs(parseInt(numMatch[1],10)) : 1;
    ELEMENT_NAMES.forEach(e=>{
      if(new RegExp("\\b"+e+"s?\\b","i").test(cleaned)){ elAgg[e].count++; elAgg[e].total+=mag; }
    });
    MECHANIC_NAMES.forEach(m=>{
      if(new RegExp("\\b"+m+"s?\\b","i").test(cleaned)){ mechAgg[m].count++; mechAgg[m].total+=mag; }
    });
  }
  allCards.forEach(c=>[c.desc,c.desc1,c.desc2].filter(Boolean).forEach(scanText));

  const elTiers = tierFor(ELEMENT_NAMES.map(e=>({key:e,total:elAgg[e].total})));
  const mechTiers = tierFor(MECHANIC_NAMES.map(m=>({key:m,total:mechAgg[m].total})));
  const genmodTiers = tierFor(ELEMENT_NAMES.map(e=>({key:e,total:genmodAgg[e].count})));

  const elements = ELEMENT_NAMES.map(e=>({ type:e, color:EL_COLOR[e], count:elAgg[e].count, ...TIER_TIPS[elTiers[e]] }));
  const mechanics = MECHANIC_NAMES.map(m=>({ type:m, count:mechAgg[m].count, ...TIER_TIPS[mechTiers[m]] }));
  const genmodRisk = ELEMENT_NAMES.map(e=>({ type:e, color:EL_COLOR[e], count:genmodAgg[e].count, ...GENMOD_TIER_TIPS[genmodTiers[e]] }));

  return { elements, mechanics, genmodRisk,
    elTierByType: Object.fromEntries(elements.map(e=>[e.type,e])),
    mechTierByType: Object.fromEntries(mechanics.map(m=>[m.type,m])),
    genmodTierByType: Object.fromEntries(genmodRisk.map(g=>[g.type,g])),
  };
}

// Cross-references the aggregate index against the player's live roster so the
// index doubles as an in-run strategy readout, not just abstract deck info.
function buildRosterRiskReport(idx){
  const roster = aliveRoster();
  if(!roster.length) return [];
  const rank = { low:0, mid:1, high:2 };
  return roster.map(core=>{
    const elInfo = idx.elTierByType[core.el];
    const mechInfo = idx.mechTierByType[core.mech];
    const activeGm = (core.genmods||[]).filter(g=>!g.disabled);
    const gmRisks = activeGm.map(g=>idx.genmodTierByType[g.el]).filter(Boolean);
    const worstGm = gmRisks.sort((a,b)=>rank[b.tone]-rank[a.tone])[0] || null;
    const worstOverall = [elInfo, mechInfo, worstGm].filter(Boolean).sort((a,b)=>rank[b.tone]-rank[a.tone])[0];
    let takeaway;
    if(worstOverall.tone==="high") takeaway = "⚠ High exposure — consider holding this BioCore back or reinforcing it with a defensive GenMod before sending it in.";
    else if(worstOverall.tone==="mid") takeaway = "◐ Some exposure — usable, but keep a backup plan if it falls behind.";
    else takeaway = "✓ Low exposure — a comparatively safe pick to lead with.";
    return { core, elInfo, mechInfo, worstGm, takeaway };
  });
}

  const statusHtml = statusLines.map(l=>`<div class="transition-clear">${esc(l)}</div>`).join("");

      <div class="card-frame" style="max-width:190px;margin:12px auto 0">${biocoreCardHTML(newAlly)}</div>
      <p class="muted" style="margin-top:14px;text-align:center;font-style:italic">${esc(teaser)}</p>
      ${bonusHtml}
      ${hoverHintHTML()}`;
  } else {
    const logHtml = f.log && f.log.length
      ? `<div class="rule-grid">${f.log.map(l=>`<div>⚡ ${esc(l)}</div>`).join("")}</div>`
      : `<p class="muted">No Overdrive condition was met this clash — printed stats applied as-is.</p>`;
    bodyHtml = `
      <p><b>${esc(f.coreName)}</b> faced <b>${esc(f.enemyName)}</b>.</p>
      <h2 style="margin-top:10px;font-size:.95rem">Overdrive Log</h2>
      ${logHtml}
      <div class="stat-compare" style="margin-top:16px">
        <div class="col"><div class="lbl">${esc(f.coreName)} ATK</div><div class="val">${f.coreAtk}</div></div>
        <div class="col"><div class="lbl">${esc(f.enemyName)} DEF</div><div class="val">${f.enemyDef}</div></div>
        <div class="col"><div class="lbl">${esc(f.enemyName)} ATK</div><div class="val">${f.enemyAtk}</div></div>
        <div class="col"><div class="lbl">${esc(f.coreName)} DEF</div><div class="val">${f.coreDef}</div></div>
      </div>
      ${f.win
        ? (f.isBoss
            ? `<p>The bioweapon is defeated! <b>${state.bossDefeats||0} of 2</b> Hollowcross bioweapons neutralized.${(state.bossDefeats||0)>=2 ? " Project Hollowcross is fully neutralized." : " Another will emerge — the gauntlet continues."}</p>`
            : `<p>The bioweapon is defeated.</p>`)
        : (f.isBoss
            ? `<p>Your BioCore takes <b>${f.dmg}</b> damage to DEF.${f.destroyed ? ` <b style="color:var(--danger)">${esc(f.coreName)} has been lost.</b>` : ""} The bioweapon escapes undefeated — a new Hollowcross threat will emerge next.</p>`
            : `<p>Your BioCore takes <b>${f.dmg}</b> damage to DEF.${f.destroyed ? ` <b style="color:var(--danger)">${esc(f.coreName)} has been lost.</b>` : ""}</p>`)
      }`;
  }

  return `
  <div class="brand"><h1>BIO<span>BATTLE</span></h1><small>CLASH RESOLUTION</small></div>
  ${progressBar()}
  ${rosterBar()}
  <div class="panel">
    <div class="result-banner ${f.win?"win":"lose"}">${f.win ? "▲ Threat Neutralized" : "▼ Clash Failed"}</div>
    ${pageHint("Read what happened below, then tap Continue when you're ready to move on.")}
    ${bodyHtml}
   <div class="btn-row"><button class="btn" id="continue-btn">Continue</button></div>
  </div>`;
}

function screenChaos(){
  const cardsHtml = state.chaosDrawn.map(c=>{
    const img = cardImgSrc("chaos", c.name);
    return `<div class="chaos-card"><img src="${img}" alt="${esc(c.name)}" draggable="false"></div>`;
  }).join("");

  const effectRows = state.roster.filter(b=>b.alive).map(b=>{
    const before = { atk: b._round.beforeAtk, def: b._round.beforeDef };
    const after = b._round;
    const swNote = after.secondWindGenmod ? ` — Second Wind: ${esc(after.secondWindGenmod)} (this round only)` : "";
    return `<div>${esc(b.name)}: ATK ${before.atk} → <b>${after.atk}</b>, DEF ${before.def} → <b>${after.def}</b>${after.disabled?" (cannot fight this round)":""}${swNote}</div>`;
  }).join("");

  const carriedLocks = state.roster.filter(b=>b.alive && (b.roundExclusions||[]).length).map(b=>
    `<div>${esc(b.name)}: ${b.roundExclusions.map(esc).join(", ")} locked this round from a previous Hollowcross Overdrive effect</div>`
  ).join("");

  const flipRows = Object.entries(state.chaosCtx||{}).filter(([name,ctx])=>ctx && ctx.flip).map(([name,ctx])=>
    `<div>🪙 ${esc(name)}: coin landed on <b>${esc(ctx.flip)}</b></div>`
  ).join("");

  let hijackHtml = "";
  if(state.pendingHijack){
    const options = [];
    state.roster.forEach((b,bi)=>{
      if(!b.alive) return;
      b.genmods.forEach((g,gi)=>{
        if(!g.disabled) options.push({bi, gi, coreName:b.name, gmName:g.name});
      });
    });
    const chips = options.length
      ? options.map(o=>`<button class="btn-chip" data-hijack-core="${o.bi}" data-hijack-genmod="${o.gi}">${esc(o.coreName)} — ${esc(o.gmName)}</button>`).join("")
      : `<p class="muted">No active GenMods to discard — Hijack has no effect this round.</p>`;
    hijackHtml = `
      <h2 style="margin-top:20px;color:var(--danger)">Hijack — Choose a GenMod to permanently discard</h2>
      <div class="btn-row" style="flex-wrap:wrap;gap:8px">${chips}</div>`;
    if(!options.length) state.pendingHijack = false;
  }

  let secondWindHtml = "";
  if(state.pendingSecondWind){
    const sw = state.pendingSecondWind;
    const gmCardsHtml = sw.options.map((g,i)=>genmodCardHTML(g, i, sw.selectedIdx===i)).join("");
    if(sw.selectedIdx===null){
      secondWindHtml = `
        <h2 style="margin-top:20px;color:var(--signal)">Second Wind — Pick a GenMod for a third slot (this round only)</h2>
        <div class="card-grid" style="max-width:340px">${gmCardsHtml.replace(/data-genmod="(\d+)"/g,'data-sw-option="$1"')}</div>`;
    } else {
      const targets = state.roster.filter(b=>b.alive).map(b=>{
        const realIdx = state.roster.indexOf(b);
        return `<div class="pick-card" data-sw-assign="${realIdx}">
          <div class="pname">${esc(b.name)}</div>
          <div class="pgm">${esc(b.el)} · ${esc(b.mech)}${b.genmods.length?" · "+b.genmods.map(g=>esc(genmodLabel(b,g))).join(", "):""}</div>
        </div>`;
      }).join("");
      secondWindHtml = `
        <h2 style="margin-top:20px;color:var(--signal)">Second Wind — Apply ${esc(sw.options[sw.selectedIdx].name)} to which BioCore?</h2>
        <div class="pick-list">${targets}</div>`;
    }
  }

  const heading = state.bossRound===1
    ? "A Chaos Factor card surfaces before the first Hollowcross bioweapon"
    : `A new Chaos Factor card surfaces before this Hollowcross encounter (attempt ${state.bossRound})`;
  const btnLabel = `Face Hollowcross Encounter ${state.bossRound}`;
  const anyPending = state.pendingHijack || state.pendingSecondWind;

  return `
  <div class="brand"><h1>BIO<span>BATTLE</span></h1><small>CHAOS DRAW ${state.bossRound}</small></div>
  ${progressBar()}
  ${rosterBar()}
  <div class="panel">
   <div class="panel-header-row">
      <h2>${esc(heading)}</h2>
      <button class="info-btn" aria-label="Show help for this screen" title="Show help for this screen">i</button>
    </div>
    ${pageHint("These effects apply automatically — no action needed yet. If a choice shows up further down (like Hijack or Second Wind), make it, then tap the button at the bottom to continue.")}
    <div class="pick-list">${cardsHtml}</div>
    ${carriedLocks ? `<h2 style="margin-top:20px">Carried over from last Overdrive</h2><div class="rule-grid">${carriedLocks}</div>` : ""}
    <h2 style="margin-top:20px">Effects applied this round</h2>
    <div class="rule-grid">${effectRows}</div>
    ${flipRows ? `<div class="rule-grid" style="margin-top:8px">${flipRows}</div>` : ""}
    ${hijackHtml}
    ${secondWindHtml}
    <div class="btn-row"><button class="btn" id="proceed-boss" ${anyPending?"disabled":""}>${esc(btnLabel)}</button></div>
  </div>`;
}

function screenEnd(){
  if(!state._achievementsEvaluated){
    state.newlyUnlocked = evaluateAchievements();
    state._achievementsEvaluated = true;
  }
  const win = state.gameOverText === "win";
  const isDeadlock = state.gameOverText === "lose-deadlock";
  const survivors = aliveRoster();
  const defeats = state.bossDefeats||0;
  const bannerText = win ? "VICTORY — PROJECT HOLLOWCROSS NEUTRALIZED"
    : (isDeadlock ? "DEFEAT — NO PLAYABLE BIOCORE" : "DEFEAT — ALL BIOCORES LOST");
  const bodyText = win
    ? `<p>Your surviving forces held the line: ${survivors.map(b=>esc(b.name)).join(", ") || "none"}.</p>`
    : (isDeadlock
        ? `<p>Every remaining BioCore was disabled by Chaos Factor and Overdrive effects going into this Hollowcross encounter, leaving no valid move. ${defeats} of 2 Hollowcross bioweapons were neutralized before the end.</p>`
        : `<p>Every BioCore in your roster fell before the mission could be completed. ${defeats} of 2 Hollowcross bioweapons were neutralized before the end.</p>`);
  const newAchHtml = (state.newlyUnlocked && state.newlyUnlocked.length) ? `
    <div class="ach-unlocked-banner">
      <div class="ach-unlocked-title">🏆 New Achievement${state.newlyUnlocked.length>1?"s":""} Unlocked</div>
      ${state.newlyUnlocked.map(a=>`<div class="ach-unlocked-item"><b>${esc(a.name)}</b> — ${esc(a.desc)}</div>`).join("")}
    </div>` : "";
  return `
  <div class="brand"><h1>BIO<span>BATTLE</span></h1><small>RUN COMPLETE</small></div>
  <div class="panel">
    <div class="result-banner ${win?"win":"lose"}">${bannerText}</div>
    ${pageHint("Tap Play Again to start a new run, Download Result Card to save an image of how this run went, or Menu to head back to the title screen.")}
    ${bodyText}
    ${newAchHtml}
    <div class="btn-row">
      <button class="btn" id="again-btn">Play Again</button>
      <button class="btn ghost" id="share-result-btn">Download Result Card</button>
      <button class="btn" id="end-menu-btn">Menu</button>
      <button class="info-btn" aria-label="Show help for this screen" title="Show help for this screen">i</button>
    </div>
  </div>
  <footer class="credit">Game Design and Development by Shivam Mohite<br>Creative Design by Aditi Rishiraj, Neethu Mariam, V. Sai Pallavi</footer>`;
}

/* ============================ EVENTS ============================ */

function attachHandlers(){
  const startBtn = document.getElementById("start-btn");
  if(startBtn) startBtn.onclick = ()=>{ newRun(); render(); };

  app.querySelectorAll(".info-btn").forEach(btn=>{
    btn.classList.toggle("active", hintOpen);
    btn.onclick = ()=>{
      hintOpen = !hintOpen;
      hintOpenScreen = state.screen;
      render();
    };
  });
  app.querySelectorAll("[data-hijack-core]").forEach(btn=>{
    btn.onclick = ()=>{
      resolveHijack(parseInt(btn.getAttribute("data-hijack-core"),10), parseInt(btn.getAttribute("data-hijack-genmod"),10));
    };
  });

  app.querySelectorAll("[data-sw-option]").forEach(el=>{
    el.onclick = ()=>{ selectSecondWindOption(parseInt(el.getAttribute("data-sw-option"),10)); };
  });
  app.querySelectorAll("[data-sw-assign]").forEach(el=>{
    el.onclick = ()=>{ resolveSecondWind(parseInt(el.getAttribute("data-sw-assign"),10)); };
  });

  app.querySelectorAll("[data-genmod]").forEach(el=>{
    el.onclick = ()=>{
      const i = parseInt(el.getAttribute("data-genmod"),10);
      if(state.starterGenmods[i].used) return;
      state.selectedGenmod = (state.selectedGenmod===i) ? null : i;
      render();
    };
  });
  app.querySelectorAll("[data-biocore]").forEach(el=>{
    el.onclick = ()=>{
      if(state.selectedGenmod===null) return;
      const bIdx = parseInt(el.getAttribute("data-biocore"),10);
      assignGenmodTo(state.selectedGenmod, bIdx);
    };
  });
  app.querySelectorAll("[data-bonus-assign]").forEach(el=>{
    el.onclick = ()=>{
      const bIdx = parseInt(el.getAttribute("data-bonus-assign"),10);
      assignBonusGenmod(bIdx);
    };
  });
  const confirmSetup = document.getElementById("confirm-setup");
  if(confirmSetup) confirmSetup.onclick = ()=>{
    state.phase = "wildbyte"; state.round = 0; state.screen = "pick"; render();
  };

  app.querySelectorAll("[data-fight]").forEach(el=>{
    el.onclick = ()=>{
      const i = parseInt(el.getAttribute("data-fight"),10);
      doFight(i);
    };
  });

  const continueBtn = document.getElementById("continue-btn");
  if(continueBtn) continueBtn.onclick = ()=>{
    if(state.pendingBonusGenmod){
      const section = document.querySelector(".bonus-genmod-section");
      if(section){
        section.scrollIntoView({behavior:"smooth", block:"center"});
        section.classList.add("flash-attention");
        setTimeout(()=>section.classList.remove("flash-attention"), 1200);
      }
      return;
    }
    proceedAfterFight();
  };

  const proceedBoss = document.getElementById("proceed-boss");
  if(proceedBoss) proceedBoss.onclick = proceedToBoss;

  const againBtn = document.getElementById("again-btn");
  if(againBtn) againBtn.onclick = ()=>{ newRun(); render(); };

  const shareResultBtn = document.getElementById("share-result-btn");
  if(shareResultBtn) shareResultBtn.onclick = downloadResultCard;

  const endMenuBtn = document.getElementById("end-menu-btn");
  if(endMenuBtn) endMenuBtn.onclick = ()=>{ state.screen = "title"; render(); };

  const enterBossPhaseBtn = document.getElementById("enter-boss-phase");
  if(enterBossPhaseBtn) enterBossPhaseBtn.onclick = beginBossPhase;

  app.querySelectorAll("#open-index-setup, #open-index-nav").forEach(el=>{
    el.onclick = (e)=>{ e.preventDefault(); state.previousScreen = state.screen; state.screen = "field-index"; render(); };
  });
  const closeIndex = document.getElementById("close-index");
  if(closeIndex) closeIndex.onclick = ()=>{ state.screen = state.previousScreen || "title"; render(); };

  const openCodex = document.getElementById("open-codex");
  if(openCodex) openCodex.onclick = ()=>{ state.previousScreen = state.screen; state.screen = "codex"; render(); };
  const openAchievements = document.getElementById("open-achievements");
  if(openAchievements) openAchievements.onclick = ()=>{ state.previousScreen = state.screen; state.screen = "achievements"; render(); };

  const openInstructions = document.getElementById("open-instructions");
  if(openInstructions) openInstructions.onclick = ()=>{ state.screen = "instructions"; render(); };
  const backToTitle = document.getElementById("back-to-title");
  if(backToTitle) backToTitle.onclick = ()=>{ state.screen = "title"; render(); };

  app.querySelectorAll(".card-frame").forEach(frame=>{
    const tip = frame.querySelector(".fact-tip");
    if(!tip) return;
    const type = frame.getAttribute("data-fact-type");
    const name = frame.getAttribute("data-fact-name");
    const base = frame.getAttribute("data-fact-base");
    let hoverTimer = null;
    let touchRevealed = false;
    function revealTip(){
      const f = getFact(type, name, base);
      tip.innerHTML = f
        ? `<div class="fact-label">Field Note — ${esc(name)}</div>${esc(f.fact)}<div class="fact-src">Source: ${esc(f.source)}</div>`
        : `<div class="fact-label">Field Note — ${esc(name)}</div>No catalogued field data for this specimen yet.`;
      tip.classList.add("show");
      markFactSeen(type, name, base);
    }
    frame.addEventListener("mouseenter", ()=>{
     hoverTimer = setTimeout(revealTip, 500);
    });
    frame.addEventListener("mouseleave", ()=>{
      clearTimeout(hoverTimer);
      tip.classList.remove("show");
    });
    // Touch equivalent: press and hold (~500ms) reveals the fact tip without
    // triggering the card's normal tap action (select/assign). A quick tap
    // still passes through as a normal click.
    frame.addEventListener("touchstart", ()=>{
      touchRevealed = false;
      hoverTimer = setTimeout(()=>{
        revealTip();
        touchRevealed = true;
      }, 500);
    }, {passive:true});
    frame.addEventListener("touchend", (e)=>{
      clearTimeout(hoverTimer);
      if(touchRevealed){
        e.preventDefault();
        setTimeout(()=>{ tip.classList.remove("show"); touchRevealed=false; }, 1800);
      }
    });
    frame.addEventListener("touchmove", ()=>{
      clearTimeout(hoverTimer);
    }, {passive:true});
  });
}

loadPersistedState();
render();
</script>
</body>
</html>
